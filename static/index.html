<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙軌科普腳本自動化引擎 V3</title>
    <meta name="description" content="Science-First × Hook-Last 雙軌科普腳本自動化引擎">
    <link rel="stylesheet" href="/static/style.css?v=3.5">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="app-container">

        <!-- Header -->
        <header class="app-header neon-glass">
            <div class="header-logo">
                <i class="fa-solid fa-atom pulse-icon"></i>
                <div class="header-text">
                    <h1>雙軌科普腳本自動化引擎</h1>
                    <p class="header-sub">V3 — Science-First × Hook-Last</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="syncBtn" class="btn btn-accent btn-sm" title="同步更新所有爬蟲資料">
                    <i class="fa-solid fa-arrows-rotate"></i> 同步資料
                </button>
                <button id="historyBtn" class="btn btn-ghost btn-sm">
                    <i class="fa-solid fa-clock-rotate-left"></i> 歷史靈感
                </button>
                <button id="dbBtn" class="btn btn-ghost btn-sm">
                    <i class="fa-solid fa-database"></i> 資料庫
                </button>
            </div>
        </header>

        <!-- Selection Bar -->
        <div class="selection-bar glass-panel">

            <div class="sel-slot sel-slot--required" id="slotScience">
                <span class="sel-slot__label">
                    <i class="fa-solid fa-microscope"></i> 科學
                </span>
                <span class="sel-slot__value" id="slotScienceVal">
                    請選擇科學文章（必選）
                </span>
            </div>

            <span class="sel-arrow">→</span>

            <div class="sel-slot" id="slotSpice">
                <span class="sel-slot__label">
                    <i class="fa-solid fa-pepper-hot"></i> 佐料
                </span>
                <span class="sel-slot__value" id="slotSpiceVal">
                    選擇社群梗或新聞（可選）
                </span>
                <button class="sel-slot__clear hidden" id="slotSpiceClear" onclick="clearSlot('spice')"
                    aria-label="清除">✕</button>
            </div>

            <div class="sel-actions">
                <button id="surpriseBtn" class="btn btn-secondary btn-sm btn-glow">
                    <i class="fa-solid fa-dice"></i> Surprise Me!
                </button>
                <button id="generateBtn" class="btn btn-primary btn-glow" disabled>
                    <i class="fa-solid fa-wand-magic-sparkles"></i> 啟動生成
                </button>
            </div>

        </div>

        <!-- Main Area -->
        <main class="app-main">

            <!-- Left Panel: Material Selection -->
            <div class="panel-left glass-panel">

                <nav class="panel-tabs">
                    <button class="tab-btn tab-btn--active" data-tab="science">
                        <i class="fa-solid fa-microscope"></i> 科學文獻 (必選)
                    </button>
                    <button class="tab-btn" data-tab="social">
                        <i class="fa-solid fa-masks-theater"></i> 話題梗
                    </button>
                    <button class="tab-btn" data-tab="news">
                        <i class="fa-solid fa-newspaper"></i> 新聞 &amp; 熱度
                    </button>
                </nav>

                <div class="panel-content">

                    <div id="tabScience" class="tab-panel tab-panel--active">
                        <div id="scienceHint" class="required-hint">
                            <i class="fa-solid fa-circle-info"></i>
                            請先從下方選取一篇科學文章作為核心定錨
                        </div>
                        <div id="scienceList" class="card-list"></div>
                        <div class="scroll-anchor" id="scienceAnchor"></div>
                    </div>

                    <div id="tabSocial" class="tab-panel hidden">
                        <div id="socialList" class="card-list"></div>
                        <div class="scroll-anchor" id="socialAnchor"></div>
                    </div>

                    <div id="tabNews" class="tab-panel hidden">
                        <div class="keywords-bar">
                            <span class="keywords-label">
                                <i class="fa-solid fa-chart-line"></i> 今日熱詞
                            </span>
                            <div id="keywordsBadge" class="keywords-pills"></div>
                        </div>
                        <div id="newsList" class="card-list"></div>
                        <div class="scroll-anchor" id="newsAnchor"></div>
                    </div>

                </div>
            </div>

            <!-- Right Panel: Generation Results -->
            <div class="panel-right glass-panel">

                <div id="resultEmpty" class="result-empty">
                    <i class="fa-solid fa-flask-vial fa-2x" style="opacity:0.3"></i>
                    <p>選取科學文章後啟動生成</p>
                    <p class="result-empty__sub">可加選社群梗或時事以提升配對精度</p>
                </div>

                <div id="resultLoader" class="loader-container hidden">
                    <div class="spinner"></div>
                    <p id="loaderText" class="loader-text">Multi-Agent Debate 進行中...</p>
                </div>

                <div id="resultContent" class="result-area hidden">

                    <div class="science-core-box">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
                            <div class="science-core-label" style="margin-bottom: 0;">
                                <i class="fa-solid fa-flask-vial"></i> 科普核心
                            </div>
                            <div id="mechanismTag" class="mechanism-tag science-mechanism" style="margin-top: 0; display: none;">
                                <i class="fa-solid fa-atom"></i>
                                <span id="mechanismText"></span>
                            </div>
                        </div>
                        <p id="scienceCoreText" class="science-core-text"></p>
                    </div>

                    <div class="hook-section glass-panel">
                        <div class="hook-tab-nav">
                            <button class="hook-tab-btn hook-tab-btn--active" data-hook="0">
                                😈 時事生活
                            </button>
                            <button class="hook-tab-btn" data-hook="1">
                                ⚔️ 動漫機制
                            </button>
                            <button class="hook-tab-btn" data-hook="2">
                                🕵️ 懸疑反常識
                            </button>
                        </div>
                        <blockquote id="hookTab0" class="hook-quote hook-quote--active"></blockquote>
                        <blockquote id="hookTab1" class="hook-quote hidden"></blockquote>
                        <blockquote id="hookTab2" class="hook-quote hidden"></blockquote>
                        
                        <!-- Individual Hook Evaluation -->
                        <div id="hookEvalContainer" class="hook-eval-container hidden" style="margin-top:1rem; padding:1rem; background:rgba(255,255,255,0.03); border-radius:0.5rem; border:1px solid rgba(255,255,255,0.1);">
                            <div style="font-weight:600; margin-bottom:0.75rem; color:var(--text-primary); display:flex; align-items:center; gap:0.5rem;">
                                <i class="fa-solid fa-chart-pie" style="color:var(--accent-primary)"></i> 單獨評分與評語
                            </div>
                            <div id="hookEvalScores" class="breakdown-grid" style="margin-bottom:0.75rem"></div>
                            <p id="hookEvalComment" style="color:var(--text-secondary); margin:0; font-size:0.9rem; line-height:1.5;"></p>
                        </div>

                        <div class="hook-actions">
                            <button id="copyHookBtn" class="btn btn-ghost btn-sm">
                                <i class="fa-solid fa-copy"></i> 複製此角度
                            </button>
                            <button id="generateScriptBtn" class="btn btn-primary btn-sm btn-glow">
                                <i class="fa-solid fa-pen-nib"></i> 使用此 Hook 產生腳本
                            </button>
                        </div>
                    </div>

                    <div id="sourceArticles" class="source-articles-box"></div>

                    <details class="collapsible-section glass-panel" id="criticSection">
                        <summary class="collapsible-header">
                            <span>
                                <i class="fa-solid fa-clipboard-check"></i> Critic 審查
                            </span>
                            <div class="critic-score-inline">
                                <span id="criticScoreInline" class="critic-score-badge">—</span>
                                <i class="fa-solid fa-chevron-down collapse-icon"></i>
                            </div>
                        </summary>
                        <div class="collapsible-body">
                            <div id="criticBreakdown" class="breakdown-grid"></div>
                            <p id="criticComment" class="critic-comment"></p>
                        </div>
                    </details>

                    <details class="collapsible-section glass-panel">
                        <summary class="collapsible-header">
                            <span>
                                <i class="fa-solid fa-brain"></i> 企劃底層邏輯
                            </span>
                            <i class="fa-solid fa-chevron-down collapse-icon"></i>
                        </summary>
                        <div class="collapsible-body">
                            <p id="reasoningText" class="reasoning-text"></p>
                        </div>
                    </details>

                    <div class="result-footer">
                        <button id="retryBtn" class="btn btn-secondary btn-sm">
                            <i class="fa-solid fa-rotate-right"></i> 重新生成
                        </button>
                        <button id="saveBtn" class="btn btn-ghost btn-sm">
                            <i class="fa-solid fa-save"></i> 儲存 CSV
                        </button>
                    </div>

                </div>

                <div id="errorBox" class="error-box glass-panel hidden">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span id="errorMessage"></span>
                    <button id="retryFromError" class="btn btn-secondary btn-sm">
                        <i class="fa-solid fa-rotate-right"></i> 重試
                    </button>
                </div>

            </div>

        </main>

        <!-- History Drawer -->
        <div id="historyDrawer" class="history-drawer hidden glass-panel">
            <div class="drawer-header">
                <h2><i class="fa-solid fa-clock-rotate-left"></i> 歷史靈感記錄</h2>
                <button id="closeHistoryBtn" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="drawer-content" id="historyList">
                <div class="loader-container" style="height: 100px;">
                    <div class="spinner" style="width: 30px; height: 30px;"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Global Sync Progress Bar -->
    <div id="syncOverlay" class="sync-overlay hidden">
        <div class="sync-overlay__content">
            <div class="sync-spinner"></div>
            <p id="syncStatusText">正在同步所有資料來源...</p>
            <div class="sync-progress-bar"><div class="sync-progress-fill" id="syncProgressFill"></div></div>
        </div>
    </div>

    <!-- DB Viewer Modal -->
    <div id="dbModal" class="db-modal hidden">
        <div class="db-modal__backdrop" onclick="closeDbModal()"></div>
        <div class="db-modal__panel glass-panel">
            <div class="db-modal__header">
                <h2><i class="fa-solid fa-database"></i> 資料庫總覽</h2>
                <div class="db-modal__tools">
                    <div class="db-search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="dbSearchInput" placeholder="快速搜尋標題..." autocomplete="off">
                    </div>
                    <button class="close-btn" onclick="closeDbModal()"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            <nav class="db-tabs">
                <button class="db-tab-btn db-tab-btn--active" data-dbtab="db-science">
                    <i class="fa-solid fa-microscope"></i> 科學文獻 <span id="dbCountScience" class="db-count">0</span>
                </button>
                <button class="db-tab-btn" data-dbtab="db-social">
                    <i class="fa-solid fa-masks-theater"></i> 話題梗 <span id="dbCountSocial" class="db-count">0</span>
                </button>
                <button class="db-tab-btn" data-dbtab="db-trends">
                    <i class="fa-solid fa-newspaper"></i> 新聞熱搜 <span id="dbCountTrends" class="db-count">0</span>
                </button>
            </nav>
            <div class="db-table-wrapper">
                <div id="dbPanelScience" class="db-panel db-panel--active">
                    <table class="db-table">
                        <thead><tr><th>#</th><th>標題</th><th>來源</th><th>機制</th><th>時間</th><th>連結</th></tr></thead>
                        <tbody id="dbBodyScience"></tbody>
                    </table>
                </div>
                <div id="dbPanelSocial" class="db-panel hidden">
                    <table class="db-table">
                        <thead><tr><th>#</th><th>標題</th><th>來源</th><th>類別</th><th>時間</th><th>連結</th></tr></thead>
                        <tbody id="dbBodySocial"></tbody>
                    </table>
                </div>
                <div id="dbPanelTrends" class="db-panel hidden">
                    <table class="db-table">
                        <thead><tr><th>#</th><th>標題</th><th>來源</th><th>機制</th><th>時間</th><th>連結</th></tr></thead>
                        <tbody id="dbBodyTrends"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="imageModal" class="image-modal hidden">
        <span class="image-modal-close" onclick="closeImageModal()">&times;</span>
        <img class="image-modal-content" id="modalImage">
    </div>

    <!-- Script Preview Modal -->
    <div id="scriptModal" class="script-modal hidden">
        <div class="script-modal__backdrop"></div>
        <div class="script-modal__panel glass-panel">
            <div class="script-modal__header">
                <h2><i class="fa-solid fa-file-lines"></i> 泛科學腳本預覽</h2>
                <div class="script-modal__tools">
                    <button class="close-btn" id="closeScriptModalBtn"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            <div class="script-modal__content" id="scriptContentArea">
                <!-- Markdown parsed here -->
            </div>
            <div class="script-modal__footer">
                <button id="exportWordBtn" class="btn btn-primary">
                    <i class="fa-solid fa-file-word"></i> 匯出至 Word (.docx)
                </button>
            </div>
        </div>
    </div>
    <script src="/static/script.js?v=3.5"></script>
</body>

</html>
